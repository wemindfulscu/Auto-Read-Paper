name: Send paper daily
# Trigger is external-only: invoke this workflow via cron-job.org (or any
# minute-accurate scheduler) hitting the GitHub workflow_dispatch API at the
# exact Beijing time you want the email sent. See README step 6 for setup.
#
# GitHub's built-in `schedule:` cron is intentionally NOT used — it drifts
# 5-15 min and frequently drops fires in low-traffic windows.
#
# No idempotency guard, no force input, no day-marker — every trigger runs
# the pipeline end-to-end. cron-job.org doesn't retry by default, so
# double-sends are not a real concern in practice. Freedom to re-trigger
# for debugging via cron-job.org's "Test run" button is worth more than
# defending against a scenario that doesn't happen.

on:
  workflow_dispatch:
    inputs:
      skip_dedup:
        description: "Force a send even if the rendered email is identical to the previous one (bypasses content-hash dedup). Leave unchecked for normal runs; only useful when re-testing SMTP/template with the same candidate pool."
        type: boolean
        default: false

# Belt and suspenders: only one run of this workflow can be active at a time.
# If a second trigger fires while one is running, the new one queues behind
# the first (cancel-in-progress: false) rather than executing in parallel —
# which would race on the score_history.json cache and could produce the
# duplicate-email symptom we saw before.
concurrency:
  group: send-paper-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      # Rolling score history is persisted per-fork via actions/cache, not
      # committed to git. This keeps each fork's state fully isolated (upstream
      # never leaks its scored papers to downstream forks) and avoids bloating
      # the repo with one commit per run.
      - name: Restore rolling score history
        uses: actions/cache/restore@v4
        with:
          path: state/score_history.json
          key: score-history-${{ github.run_id }}
          restore-keys: |
            score-history-

      - name: Run script
        env:
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          # Primary unified LLM credentials.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_MAX_TOKENS: ${{ vars.LLM_MAX_TOKENS }}
          # Deprecated fallbacks — kept so pre-rename forks keep running. Migrate
          # to the LLM_* names above and delete these rows once done.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_MAX_TOKENS: ${{ vars.OPENAI_MAX_TOKENS }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
          SKIP_DEDUP: ${{ inputs.skip_dedup && '1' || '' }}
        run: |
          # Surface which name family is in use so a misconfigured fork debugs
          # in seconds instead of staring at a 401 from LiteLLM.
          if [ -n "${LLM_API_KEY:-}" ]; then
            echo "Using LLM_API_KEY (new name)"
          elif [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "::warning::Using OPENAI_API_KEY (deprecated). Rename your repo secret to LLM_API_KEY — see README."
          else
            echo "::error::Neither LLM_API_KEY nor OPENAI_API_KEY is set."
            exit 1
          fi
          [ -n "${OPENAI_MODEL:-}" ] && [ -z "${LLM_MODEL:-}" ] && echo "::warning::Using OPENAI_MODEL (deprecated). Rename your repo variable to LLM_MODEL."
          [ -n "${OPENAI_MAX_TOKENS:-}" ] && [ -z "${LLM_MAX_TOKENS:-}" ] && echo "::warning::Using OPENAI_MAX_TOKENS (deprecated). Rename your repo variable to LLM_MAX_TOKENS."
          echo "Effective model: ${LLM_MODEL:-${OPENAI_MODEL:-gpt-4o-mini}}"
          echo "Effective max_tokens: ${LLM_MAX_TOKENS:-${OPENAI_MAX_TOKENS:-4096}}"
          if [ -n "$CUSTOM_CONFIG" ]; then
            # C1 fix: route CUSTOM_CONFIG through a sanitizer that rejects
            # ${...} interpolations (they would otherwise let a tampered repo
            # variable exfiltrate LLM_API_KEY / SENDER_PASSWORD via
            # OmegaConf's resolver). Aborts the workflow on any violation.
            uv run --with pyyaml python scripts/sanitize_custom_config.py config/custom.yaml <<< "$CUSTOM_CONFIG"
          else
            echo "::warning::CUSTOM_CONFIG repo variable is empty — falling back to repo's config/custom.yaml (neutral: will fail loudly)."
          fi
          echo "Effective config/custom.yaml:"
          cat config/custom.yaml
          echo "---"
          echo "Effective source.arxiv keywords (from the YAML above):"
          awk '/^source:/{s=1} s && /^[^ ]/ && !/^source:/{s=0} s' config/custom.yaml | sed -n '/keywords:/,/^[^ ]/p' || true
          uv run src/auto_read_paper/main.py

      # `if: always()` — save the cache even if the previous step errored.
      # Critical: executor.py persists the content-hash BEFORE calling SMTP,
      # so if the step fails after delivery (transient error, runner killed)
      # the hash is already on disk. Without this guard the cache save was
      # skipped and the next run re-sent the same email — the exact
      # "duplicate email at the same time" symptom this defends against.
      - name: Save rolling score history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/score_history.json
          key: score-history-${{ github.run_id }}
