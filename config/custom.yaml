# Fallback config used only when the CUSTOM_CONFIG repo variable is unset/empty.
# Intentionally left WITHOUT category/keywords so that a missing CUSTOM_CONFIG
# fails loudly at startup (ArxivRetriever raises "category must be specified")
# instead of silently running under upstream's example keywords.
#
# To configure the pipeline, set the CUSTOM_CONFIG repo variable — see README.

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:LLM_API_KEY,${oc.env:OPENAI_API_KEY}}
    base_url: ${oc.env:LLM_API_BASE,${oc.env:OPENAI_API_BASE}}
  model: ${oc.env:LLM_MODEL,${oc.env:OPENAI_MODEL,gpt-4o-mini}}
  max_tokens: ${oc.env:LLM_MAX_TOKENS,${oc.env:OPENAI_MAX_TOKENS,4096}}
  temperature: 0.3
  timeout: 60
  max_retries: 3
  language: Chinese

executor:
  debug: ${oc.env:DEBUG,null}
  send_empty: false
  max_paper_num: 10
  source: ['arxiv']
  reranker: reader_reviewer
